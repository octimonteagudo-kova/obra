<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OBRA — Objetos de diseño</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: #0a0a0a;
      -webkit-font-smoothing: antialiased;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: #f0ede8;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0a0a0a; }
    ::-webkit-scrollbar-thumb { background: rgba(200,185,155,0.2); }

    @keyframes smokeRise {
      0%   { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
      15%  { opacity: 0.5; }
      60%  { transform: translateY(-90px) translateX(10px) scale(3); opacity: 0.25; }
      100% { transform: translateY(-180px) translateX(-6px) scale(5); opacity: 0; }
    }
    @keyframes scrollPulse {
      0%, 100% { opacity: 0.3; transform: scaleY(1); }
      50% { opacity: 0.7; transform: scaleY(1.1); }
    }
    @keyframes heroIn {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .smoke-particle {
      position: absolute;
      border-radius: 50%;
      filter: blur(10px);
      animation: smokeRise 6s ease-out infinite;
      pointer-events: none;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 28px 48px;
      display: flex; justify-content: space-between; align-items: center;
      transition: background 0.6s ease;
    }
    nav.scrolled {
      background: rgba(10,10,10,0.88);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px; font-weight: 300;
      letter-spacing: 0.38em; color: #f0ede8; text-transform: uppercase;
    }
    .nav-links { display: flex; gap: 40px; align-items: center; }
    .nav-link {
      font-size: 10px; letter-spacing: 0.2em;
      color: rgba(240,237,232,0.45); text-transform: uppercase;
      cursor: pointer; transition: color 0.3s; text-decoration: none;
    }
    .nav-link:hover { color: #f0ede8; }
    
    /* Botón Comprar unificado */
    .nav-btn {
      font-size: 9px; letter-spacing: 0.25em; color: #1a1a1a;
      background: #d4c9b8; border: none; padding: 10px 24px;
      cursor: pointer; text-transform: uppercase; transition: background 0.3s;
    }
    .nav-btn:hover { background: #e8ddd0; }

    /* ── HERO ── */
    #hero {
      position: relative; 
      height: 100vh; 
      min-height: 700px;
      overflow: hidden; 
      background: #0a0a0a;
      display: flex; 
      align-items: center;    /* Centrado vertical real */
      justify-content: center; /* Centrado horizontal real */
    }
    .hero-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 65% 75% at 68% 38%, rgba(80,65,50,0.38) 0%, transparent 70%),
        radial-gradient(ellipse 40% 50% at 28% 62%, rgba(50,45,38,0.22) 0%, transparent 60%),
        linear-gradient(160deg, #0f0e0c 0%, #1a1714 40%, #0d0c0b 100%);
    }
    .hero-grain {
      position: absolute; inset: 0; opacity: 0.55; mix-blend-mode: overlay; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    }
    .hero-text {
      position: relative;
      z-index: 10;
      max-width: 800px;
      width: 100%;
      animation: heroIn 1.5s ease forwards;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 0 24px;
      margin-top: -40px; /* Ajuste fino para la barra de nav */
    }
    .hero-h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(44px, 7.5vw, 90px); font-weight: 300;
      line-height: 0.98; color: #f0ede8; letter-spacing: -0.01em; margin-bottom: 30px;
    }
    .hero-h1 em { font-style: italic; color: #c8b99a; }
    .hero-sub {
      font-size: 13px; line-height: 1.75;
      color: rgba(200,185,155,0.5);
      letter-spacing: 0.04em; margin-bottom: 54px;
    }
    .hero-cta {
      font-size: 9px; letter-spacing: 0.32em; text-transform: uppercase;
      color: #1a1714; background: #d4c9b8; border: none; padding: 16px 42px;
      cursor: pointer; transition: all 0.4s ease;
      display: inline-flex; align-items: center; gap: 14px;
    }
    .hero-cta:hover { background: #e8ddd0; letter-spacing: 0.38em; }
    
    /* ── PRODUCT FIGURES ── */
    #figures {
      background: #0a0a0a;
      padding: 100px 52px;
      scroll-margin-top: 50px; /* Aire arriba al scrollear */
    }
    .figures-header {
      display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 72px;
    }
    .figures-h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(30px, 4vw, 50px); font-weight: 300; color: #f0ede8;
    }
    .figures-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
    .figure-card {
      position: relative; aspect-ratio: 3/4; overflow: hidden; cursor: pointer;
      border: 1px solid rgba(200,185,155,0.05);
      transition: border-color 0.4s; background: #111009;
      text-decoration: none; display: block;
    }
    .figure-card:hover { border-color: rgba(200,185,155,0.14); }
    .figure-card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(8,7,6,0.92) 0%, transparent 60%);
    }
    .figure-card-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 28px 30px; }
    .figure-card-name { font-family: 'Cormorant Garamond', serif; font-size: 21px; color: #f0ede8; margin-bottom: 5px; }
    .figure-card-sub { font-size: 9px; color: rgba(200,185,155,0.38); text-transform: uppercase; }
    .figure-card-price { margin-top: 15px; display: flex; justify-content: space-between; opacity: 0; transform: translateY(10px); transition: 0.4s; }
    .figure-card:hover .figure-card-price { opacity: 1; transform: translateY(0); }

    #philosophy, #gallery, #quote, #cta, footer { padding: 10
