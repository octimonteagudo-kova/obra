<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OBRA — Objetos de diseño</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: #0a0a0a;
      -webkit-font-smoothing: antialiased;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: #f0ede8;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0a0a0a; }
    ::-webkit-scrollbar-thumb { background: rgba(200,185,155,0.2); }

    @keyframes smokeRise {
      0%   { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
      15%  { opacity: 0.5; }
      60%  { transform: translateY(-90px) translateX(10px) scale(3); opacity: 0.25; }
      100% { transform: translateY(-180px) translateX(-6px) scale(5); opacity: 0; }
    }
    @keyframes scrollPulse {
      0%, 100% { opacity: 0.3; transform: scaleY(1); }
      50% { opacity: 0.7; transform: scaleY(1.1); }
    }
    @keyframes heroIn {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .smoke-particle {
      position: absolute;
      border-radius: 50%;
      filter: blur(10px);
      animation: smokeRise 6s ease-out infinite;
      pointer-events: none;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 28px 48px;
      display: flex; justify-content: space-between; align-items: center;
      transition: background 0.6s ease, border-color 0.6s;
    }
    nav.scrolled {
      background: rgba(10,10,10,0.88);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px; font-weight: 300;
      letter-spacing: 0.38em; color: #f0ede8; text-transform: uppercase;
    }
    .nav-links { display: flex; gap: 40px; align-items: center; }
    .nav-link {
      font-size: 10px; letter-spacing: 0.2em;
      color: rgba(240,237,232,0.45); text-transform: uppercase;
      cursor: pointer; transition: color 0.3s; text-decoration: none;
    }
    .nav-link:hover { color: #f0ede8; }
    .nav-btn {
      font-size: 9px; letter-spacing: 0.25em; color: #1a1a1a;
      background: #d4c9b8; border: none; padding: 10px 24px;
      cursor: pointer; text-transform: uppercase; transition: background 0.3s;
    }
    .nav-btn:hover { background: #e8ddd0; }

    /* ── HERO ── */
    #hero {
      position: relative; 
      height: 100vh; 
      min-height: 700px;
      overflow: hidden; 
      background: #0a0a0a;
      display: flex; 
      align-items: center;    /* CENTRADO VERTICAL */
      justify-content: center; /* CENTRADO HORIZONTAL */
    }
    .hero-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 65% 75% at 68% 38%, rgba(80,65,50,0.38) 0%, transparent 70%),
        radial-gradient(ellipse 40% 50% at 28% 62%, rgba(50,45,38,0.22) 0%, transparent 60%),
        linear-gradient(160deg, #0f0e0c 0%, #1a1714 40%, #0d0c0b 100%);
    }
    .hero-grain {
      position: absolute; inset: 0; opacity: 0.55; mix-blend-mode: overlay; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    }
    .hero-warmlight {
      position: absolute; top: -12%; right: 8%;
      width: 420px; height: 420px; pointer-events: none;
      background: radial-gradient(circle, rgba(180,140,80,0.13) 0%, transparent 70%);
    }
    .hero-hline {
      position: absolute; top: 50%; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(200,185,155,0.05) 30%, rgba(200,185,155,0.05) 70%, transparent 100%);
    }
    .hero-text {
      position: relative;
      z-index: 10;
      max-width: 800px;
      width: 100%;
      animation: heroIn 1.5s ease forwards;
      padding: 0 24px;
      margin-top: -30px; /* Ajuste para compensar visualmente la nav */
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .hero-eyebrow {
      font-size: 9px; letter-spacing: 0.42em;
      color: rgba(200,185,155,0.45); text-transform: uppercase; margin-bottom: 30px;
    }
    .hero-h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(44px, 7.5vw, 90px); font-weight: 300;
      line-height: 0.98; color: #f0ede8; letter-spacing: -0.01em; margin-bottom: 30px;
    }
    .hero-h1 em { font-style: italic; color: #c8b99a; }
    .hero-sub {
      font-size: 13px; line-height: 1.75;
      color: rgba(200,185,155,0.5);
      letter-spacing: 0.04em; margin-bottom: 54px; width: 100%;
    }
    .hero-cta {
      font-size: 9px; letter-spacing: 0.32em; text-transform: uppercase;
      color: #1a1714; background: #d4c9b8; border: none; padding: 16px 42px;
      cursor: pointer; transition: all 0.4s ease;
      display: inline-flex; align-items: center; gap: 14px;
    }
    .hero-cta:hover { background: #e8ddd0; letter-spacing: 0.38em; }
    .hero-cta span { font-size: 15px; opacity: 0.55; }
    .hero-vignette {
      position: absolute; bottom: 0; left: 0; right: 0; height: 220px; pointer-events: none;
      background: linear-gradient(to top, #0a0a0a 0%, transparent 100%);
    }
    .scroll-hint {
      position: absolute; bottom: 30px; right: 48px;
      display: flex; flex-direction: column; align-items: center; gap: 8px; opacity: 0.28;
    }
    .scroll-line {
      width: 1px; height: 50px;
      background: linear-gradient(to bottom, transparent, #c8b99a);
      animation: scrollPulse 2.2s ease infinite;
    }
    .scroll-word {
      font-size: 7px; letter-spacing: 0.28em; color: #c8b99a;
      text-transform: uppercase; writing-mode: vertical-rl;
    }

    /* ── PHILOSOPHY ── */
    #philosophy {
      background: #0d0c0b; padding: 140px 52px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center;
    }
    .section-tag {
      font-size: 9px; letter-spacing: 0.42em;
      color: rgba(200,185,155,0.38); text-transform: uppercase; margin-bottom: 40px;
    }
    .phil-h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(36px, 5vw, 66px); font-weight: 300;
