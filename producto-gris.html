<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Figure — Gris | OBRA</title>
    <link rel="stylesheet" href="style.css">
    <style>
.product-page {
    padding: 120px 5% 50px;
    display: grid;
    grid-template-columns: 1.2fr 0.8fr; /* Le damos un poco menos de espacio a la info para que no choquen */
    gap: 80px; /* Aumentamos el espacio de separación entre la foto y el texto */
    background: #0a0a0a;
    min-height: 100vh;
    align-items: start; /* Alinea todo arriba para que no se mueva raro */
}
.gallery {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    max-width: 800px;
}

.gallery img {
    width: 100%;
    max-width: 400px; /* Limita el ancho de cada foto */
    height: auto;
    background: #111;
    border-radius: 4px;
    object-fit: contain;
    padding: 20px;
    margin: 0 auto;
    display: block;
}

.info-panel {
    position: sticky;
    top: 120px;
    height: fit-content;
    color: #c8b99b;
    padding-left: 40px; /* Esto le da aire extra para que no choque con las fotos */
}
        }
        .btn-comprar {
            display: block;
            width: 100%;
            padding: 20px;
            background: #c8b99b;
            color: #000;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            margin-top: 30px;
            letter-spacing: 2px;
            transition: 0.3s;
        }
        .btn-comprar:hover { background: #e2d5ba; }
        @media (max-width: 900px) {
            .product-page { grid-template-columns: 1fr; padding-top: 80px; }
            .info-panel { position: static; }
            .gallery img { height: 300px; }
        }
    </style>
</head>
<body>
    <div class="product-page">
        <div class="gallery">
            <img src="cuerpo%20completo.png" alt="Frente">
            <img src="costado.png" alt="Costado">
            <img src="espalda.png" alt="Espalda">
            <img src="base.png" alt="Base">
        </div>

        <div class="info-panel">
            <a href="index.html" style="color: rgba(200,185,155,0.5); text-decoration: none; font-size: 12px; letter-spacing: 1px;">← VOLVER AL CATÁLOGO</a>

            <p style="letter-spacing: 3px; opacity: 0.6; font-size: 11px;">CERÁMICA · EDICIÓN I · GRIS</p>
            <p style="font-size: 26px; margin: 30px 0; font-family: 'Cormorant Garamond', serif;">$89.000</p>

</html>
