<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Figure — Gris | OBRA</title>
    <link rel="stylesheet" href="style.css"> <!-- Usamos tu mismo CSS -->
    <style>
        .product-page {
            padding: 120px 5% 50px;
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 40px;
            background: #0a0a0a;
            min-height: 100vh;
        }
        .gallery {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .gallery img {
            width: 100%;
            background: #111;
            border-radius: 5px;
            object-fit: contain;
        }
        .info-panel {
            position: sticky;
            top: 120px;
            height: fit-content;
            color: #c8b99b;
        }
        .btn-comprar {
            display: block;
            width: 100%;
            padding: 20px;
            background: #c8b99b;
            color: #000;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            margin-top: 30px;
            letter-spacing: 2px;
        }
        @media (max-width: 900px) {
            .product-page { grid-template-columns: 1fr; }
            .info-panel { position: static; }
        }
    </style>
</head>
<body>
    <div class="product-page">
        <!-- Galería con tus fotos reales -->
        <div class="gallery">
            <img src="cuerpo completo gris.png" alt="Vista Principal">
            <img src="costado gris.png" alt="Vista Lateral">
            <img src="espalda gris.png" alt="Vista Trasera">
            <img src="base gris.png" alt="Vista Base">
        </div>

        <!-- Información -->
        <div class="info-panel">
            <a href="index.html" style="color: rgba(200,185,155,0.5); text-decoration: none; font-size: 12px;">← VOLVER</a>
            <h1 style="font-family: 'Cormorant Garamond', serif; font-size: 42px; margin: 20px 0 10px;">The Figure</h1>
            <p style="letter-spacing: 3px; opacity: 0.7;">CERÁMICA · EDICIÓN I · GRIS</p>
            <p style="font-size: 24px; margin: 30px 0;">$89.000</p>
            <p style="line-height: 1.6; opacity: 0.9;">
                Portasahumerios artesanal de cerámica. Su diseño minimalista permite que la ceniza se deposite en la base de forma limpia, mientras el humo fluye rodeando la figura.
            </p>
            <a href="#" class="btn-comprar">COMPRAR AHORA</a>
        </div>
    </div>
</body>
</html>
